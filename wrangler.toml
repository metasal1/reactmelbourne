name = "reactmelbourne"
main = ".open-next/worker.js"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[routes]]
pattern = "reactmelbourne.com"
custom_domain = true

[[routes]]
pattern = "www.reactmelbourne.com"
custom_domain = true
